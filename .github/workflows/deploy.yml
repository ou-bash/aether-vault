name: Continuous Deployment

on:
  push:
    branches: [ main ]

# ADD THIS SECTION TO PREVENT QUEUING
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Power Cleanup
        run: |
          docker rm -f $(docker ps -aq) 2>/dev/null || true
          docker network rm aether-network-tf 2>/dev/null || true
          docker network prune -f
          sudo fuser -k 80/tcp 8080/tcp 3000/tcp 9090/tcp 3100/tcp || true
          sleep 5
        continue-on-error: true

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve -var="project_root=/home/anumoymajhi/project/project-ssh-cloud/aether-vault"
