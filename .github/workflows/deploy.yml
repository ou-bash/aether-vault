name: Continuous Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Clean up existing Docker resources
        # This clears the way so Terraform has a "clean slate"
        run: |
          docker rm -f nginx-proxy-tf aethervault-terraform 2>/dev/null || true
          docker network rm aether-network-tf 2>/dev/null || true
        continue-on-error: true

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve -var="project_root=/home/anumoymajhi/project/project-ssh-cloud/aether-vault"

      - name: Clean up existing Docker resources
        run: |
          # Kill all running containers to free up the network
          docker rm -f $(docker ps -aq) || true
          # Force remove the network
          docker network rm aether-network-tf || true
          # Clear the ports just in case
          sudo fuser -k 80/tcp 8080/tcp 3000/tcp || true
        continue-on-error: true

