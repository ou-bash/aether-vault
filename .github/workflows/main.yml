name: AetherVault CI Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Job 1: Check the quality of Shell scripts
  lint-scripts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run ShellCheck
        run: |
          # Testing core automation scripts for bugs
          # 2. UPDATE THIS ENTIRE STEP
      - name: Run ShellCheck
        run: |
          # Ensure scripts exist and are executable before linting
          chmod +x scripts/*.sh
          for script in scripts/backup.sh scripts/install.sh scripts/setup_db.sh; do
            if [ -f "$script" ]; then
              shellcheck "$script"
            else
              echo "Error: $script not found!"
              exit 1
            fi
          done

  # Job 2: Verify the Docker configuration
  verify-docker:
    needs: lint-scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate Docker Compose
        run: |
          # This checks for syntax errors in your compose file 
          # without actually starting the containers
          docker compose config

      - name: Build Test Image
        run: |
          # Ensures the Dockerfile (if you have one) or the 
          # compose images pull correctly
          docker compose build
