name: aether-vault

services:
  traefik:
    image: traefik:v3.0
    container_name: traefik-gateway
    security_opt:
      - label:disable
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.endpoint=unix:///var/run/docker.sock?version=1.40"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: always

  aethervault:
    image: filebrowser/filebrowser:latest
    container_name: aethervault-docker
    user: "${UID:-1000}:${GID:-1000}"
    env_file:
      - .env
    ports:
      - "8080:80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.aether.rule=Host(`localhost`)"
      - "traefik.http.services.aether.loadbalancer.server.port=80"
    volumes:
      - ./files:/srv
      - ./database/filebrowser.db:/database/filebrowser.db
      - ./.env:/config/.env
    restart: always
