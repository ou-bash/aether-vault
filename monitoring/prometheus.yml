# 1. Overwrite with the correct config
cat <<EOF > /home/anumoymajhi/project/project-ssh-cloud/aether-vault/monitoring/prometheus.yml
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'aethervault'
    static_configs:
      - targets: ['aethervault-terraform:8080']
EOF

# 2. Restart Prometheus to apply
docker restart prometheus

